# HKGAN: Hierarchical Knowledge-enhanced Graph Attention Network
# 核心創新：階層式 BERT + SenticNet 知識門控 + 純 PyTorch GAT + 跨面向建模

experiment_name: "hkgan"

model:
  improved: "hkgan"
  # DAPT 模型對應表：根據資料集自動選擇
  bert_model:
    laptops: "data/dapt/laptop_dapt/final"
    lap16: "data/dapt/laptop_dapt/final"
    restaurants: "data/dapt/restaurant_dapt/final"
    rest16: "data/dapt/restaurant_dapt/final"
    default: "bert-base-uncased"
  freeze_bert: false
  hidden_dim: 768
  dropout: 0.3

  # GAT 參數
  gat_heads: 4
  gat_layers: 2
  iarm_heads: 4

  # SenticNet 知識增強
  use_senticnet: true
  knowledge_weight:
    restaurants: 0.02
    laptops: 0.02
    mams: 0.02
    rest16: 0.1
    lap16: 0.05
    default: 0.1

  # 信心門控：動態決定是否信任 SenticNet
  use_confidence_gate: true

  # 動態知識門控：軟性門控取代硬性注入
  use_dynamic_gate: true

  # 已停用領域過濾（Dynamic Gate 取代）
  domain: null

# 知識庫 backend：nrc_vad（覆蓋率高）或 senticnet
knowledge_backend: senticnet

data:
  use_augmented: false
  use_self_training: false
  min_aspects: 2
  max_aspects: 8
  include_single_aspect: true
  virtual_aspect_mode: "overall"
  max_text_len: 128
  max_aspect_len: 10

training:
  batch_size: 16
  accumulation_steps: 2    # 等效 batch_size = 32
  epochs: 40
  lr:
    restaurants: 3.0e-5
    laptops: 3.0e-5
    mams: 3.0e-5
    rest16: 3.0e-5
    lap16: 2.0e-5
    default: 3.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  patience: 12
  seed: 42

  use_scheduler: true
  warmup_ratio: 0.1

  # 損失函數配置
  loss_type: "focal"
  focal_gamma:
    restaurants: 2.5
    laptops: 2.5
    mams: 2.0
    rest16: 2.0
    lap16: 2.5
    default: 2.0
  class_weights:
    restaurants: [1.2, 2.0, 0.6]
    laptops: [1.0, 1.8, 0.7]
    mams: [1.0, 1.0, 1.0]
    rest16: [1.5, 3.0, 0.5]
    lap16: [1.2, 2.0, 0.6]
    default: [1.0, 1.8, 0.8]

  virtual_weight: 0.5

  # LLRD
  use_llrd: true
  llrd_decay:
    restaurants: 0.95
    laptops: 0.95
    mams: 0.95
    rest16: 0.95
    lap16: 0.90
    default: 0.95

  # 非對稱 Logit 調整：grid search 初始值，由驗證集自動決定
  neutral_boost:
    default: 0.0
  neg_suppress:
    default: 0.0
  pos_suppress:
    default: 0.0

  # Stratified Batch Sampler：均衡各類別訓練訊號
  use_stratified_sampler: true

  # Gate Penalty，0.0 = 關閉
  gate_penalty_weight: 0.0
