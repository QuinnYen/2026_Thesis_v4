# =============================================================================
# Tier 2 組件組合消融: w/o Knowledge Gating
# =============================================================================
# 同時移除 Confidence Gate + Dynamic Gate，保留 SenticNet 硬性注入
# 預期效果差異: 0-2%（驗證門控機制的整體價值）
#
# 保留：SenticNet（硬性注入）, Hierarchical GAT, Loss Engineering
#
# 消融基準對齊（方案乙）：
#   epochs=40, patience=12（對齊方案四）
#   knowledge_weight=0.05（統一值，無門控的硬性注入用中間值）

experiment_name: "ablation_no_knowledge_gating"

model:
  improved: "hkgan"
  bert_model:
    laptops: "data/dapt/laptop_dapt/final"
    lap16: "data/dapt/laptop_dapt/final"
    restaurants: "data/dapt/restaurant_dapt/final"
    rest16: "data/dapt/restaurant_dapt/final"
    default: "bert-base-uncased"
  freeze_bert: false
  hidden_dim: 768
  dropout: 0.3

  # GAT 參數（保留）
  gat_heads: 4
  gat_layers: 2

  # === SenticNet 保留但移除所有門控 ===
  use_senticnet: true
  knowledge_weight: 0.05
  use_confidence_gate: false
  use_dynamic_gate: false
  domain: null

  # Inter-Aspect（保留）
  iarm_heads: 4

data:
  use_augmented: false
  use_self_training: false
  min_aspects: 2
  max_aspects: 8
  include_single_aspect: true
  virtual_aspect_mode: "overall"
  max_text_len: 128
  max_aspect_len: 10

training:
  batch_size: 16
  accumulation_steps: 2
  epochs: 40
  lr: 3.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  patience: 12
  seed: 42

  use_scheduler: true
  warmup_ratio: 0.1

  # 保留 Loss Engineering（統一超參）
  loss_type: "focal"
  focal_gamma: 2.0
  class_weights: [1.0, 1.8, 0.8]

  virtual_weight: 0.5

  # 保留 LLRD
  use_llrd: true
  llrd_decay: 0.95

  # 保留 Stratified Sampler
  use_stratified_sampler: true

  # Gate Penalty 關閉
  gate_penalty_weight: 0.0

  neutral_boost:
    default: 0.0
  neg_suppress:
    default: 0.0
  pos_suppress:
    default: 0.0
