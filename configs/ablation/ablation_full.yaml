# =============================================================================
# 消融基準：完整 HKGAN（統一超參版）
# =============================================================================
# 用途：消融實驗的 full model 基準線
#       與各消融變體用完全相同的統一超參，差值才有意義
#
# 注意：此 config 不是論文主實驗用的（主實驗用 configs/unified_hkgan.yaml，含 per-dataset routing）
#       這裡故意不做 per-dataset routing，保持和消融變體一致
#
# 對齊設定（方案乙）：
#   epochs=40, patience=12（對齊方案四）
#   lr=3.0e-5（統一）
#   knowledge_weight=0.05（各 dataset 的折衷值：rest14/lap14/mams=0.02~0.1 的中間）
#   class_weights=[1.0,1.8,0.8]（通用值）
#   focal_gamma=2.0（通用值）

experiment_name: "ablation_full"

model:
  improved: "hkgan"
  bert_model:
    laptops: "data/dapt/laptop_dapt/final"
    lap16: "data/dapt/laptop_dapt/final"
    restaurants: "data/dapt/restaurant_dapt/final"
    rest16: "data/dapt/restaurant_dapt/final"
    default: "bert-base-uncased"
  freeze_bert: false
  hidden_dim: 768
  dropout: 0.3

  # GAT 參數
  gat_heads: 4
  gat_layers: 2

  # 知識增強（全開，統一 weight）
  use_senticnet: true
  knowledge_weight: 0.05
  use_confidence_gate: true
  use_dynamic_gate: true
  domain: null

  # Inter-Aspect（全開）
  iarm_heads: 4

data:
  use_augmented: false
  use_self_training: false
  min_aspects: 2
  max_aspects: 8
  include_single_aspect: true
  virtual_aspect_mode: "overall"
  max_text_len: 128
  max_aspect_len: 10

training:
  batch_size: 16
  accumulation_steps: 2
  epochs: 40
  lr: 3.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  patience: 12
  seed: 42

  use_scheduler: true
  warmup_ratio: 0.1

  # Loss Engineering（統一超參）
  loss_type: "focal"
  focal_gamma: 2.0
  class_weights: [1.0, 1.8, 0.8]

  virtual_weight: 0.5

  # LLRD
  use_llrd: true
  llrd_decay: 0.95

  # Stratified Sampler
  use_stratified_sampler: true

  # Gate Penalty 關閉
  gate_penalty_weight: 0.0

  neutral_boost:
    default: 0.0
  neg_suppress:
    default: 0.0
  pos_suppress:
    default: 0.0
